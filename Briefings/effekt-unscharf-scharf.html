*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Figtree",sans-serif;background:var(--cream);color:var(--ink)}
.spacer{height:88vh;display:grid;place-items:center;text-align:center;padding:0 24px}
.spacer p{max-width:46ch;color:#6a6a64;font-size:18px;line-height:1.6}
.hint{margin-top:12px;color:var(--green);font-weight:600}
.stage-wrap{height:280vh;position:relative}
.stage{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}
.frame{position:relative;height:min(86vh,820px);aspect-ratio:1100/1650;border-radius:16px;overflow:hidden;
  box-shadow:0 30px 70px -40px rgba(15,110,89,.55);background:#ccc}
.layer{position:absolute;inset:0;background:var(--img) center/cover no-repeat}
#base{filter:blur(11px) saturate(.9);transform:scale(1.08)}
#sharp{clip-path:polygon(62% 0,62% 0,46% 100%,46% 100%)}
.scan{position:absolute;top:0;bottom:0;width:2px;background:var(--green);left:62%;opacity:0;
  box-shadow:0 0 12px rgba(15,110,89,.7)}
.scan::before{content:"";position:absolute;top:0;bottom:0;left:-7px;border-left:2px dashed rgba(15,110,89,.5)}
.cap{position:absolute;left:6%;bottom:7%;max-width:46%;z-index:3}
.cap h3{font-style:italic;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.6);font-size:14px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.cap p{color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.6);font-size:clamp(18px,2.2vw,26px);font-weight:600;line-height:1.2}
@media (prefers-reduced-motion: reduce){#sharp{clip-path:polygon(32% 0,92% 0,88% 100%,4% 100%)!important}.scan{display:none}}
</style></head><body>
<div class="spacer"><div><p>Scrolle nach unten – sobald das Bild den Schirm füllt, wird im diagonalen Keil scharfgestellt.</p><div class="hint">↓ scrollen</div></div></div>
<div class="stage-wrap" id="wrap"><div class="stage"><div class="frame">
  <div class="layer" id="base"></div>
  <div class="layer" id="sharp"></div>
  <div class="scan" id="scan"></div>
  <div class="cap"><h3>Im Fokus</h3><p>Wir gehen Ihren Beschwerden auf den Grund.</p></div>
</div></div></div>
<div class="spacer"><p>Demo-Ende · ein einzelner Moment, sparsam eingesetzt.</p></div>
<script>
const wrap=document.getElementById('wrap'),sharp=document.getElementById('sharp'),scan=document.getElementById('scan');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function upd(){
  const r=wrap.getBoundingClientRect(); const total=r.height-innerHeight;
  const p=clamp((-r.top)/total,0,1);
  const mt=62,mb=46,ht=p*30,hb=p*42;
  sharp.style.clipPath=`polygon(${mt-ht}% 0,${mt+ht}% 0,${mb+hb}% 100%,${mb-hb}% 100%)`;
  scan.style.left=(((mt+ht)+(mb+hb))/2)+'%';
  scan.style.opacity=(p>0.02&&p<0.99)?1:0;
}
if(!matchMedia('(prefers-reduced-motion: reduce)').matches){
  let tick=false;
  addEventListener('scroll',()=>{if(!tick){requestAnimationFrame(()=>{upd();tick=false});tick=true}},{passive:true});
  addEventListener('resize',upd); upd();
}
</script></body></html>
